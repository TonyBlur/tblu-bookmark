  <script>
    const I18N = {
      zh: {
        clear: '清除',
        clearTags: '清除标签',
        tagFilter: 'Tag 筛选',
        searchPlaceholder: '搜索书签 / 标签 / 网址...',
        noResultsTitle: '没有找到匹配内容',
        noResultsDesc: '试试更短关键词、同义词或切换标签筛选。',
        searchResults: '搜索结果',
        bookmark: '书签',
        home: '主页',
        records: '条记录',
        languageLabel: '中文',
        close: '关闭',
        folderTags: '当前文件夹标签',
        themeSystem: '跟随系统',
        themeLight: '浅色',
        themeDark: '深色',
      },
      en: {
        clear: 'Clear',
        clearTags: 'Clear tags',
        tagFilter: 'Tag filters',
        searchPlaceholder: 'Search bookmarks / tags / URLs...',
        noResultsTitle: 'No matching results',
        noResultsDesc: 'Try shorter keywords, synonyms, or switch tag filters.',
        searchResults: 'Search Results',
        bookmark: 'Bookmark',
        home: 'Home',
        records: 'records',
        languageLabel: 'EN',
        close: 'Close',
        folderTags: 'Folder tags',
        themeSystem: 'System',
        themeLight: 'Light',
        themeDark: 'Dark',
      }
    };

    const appState = {
      rawData: [],
      activePath: [],
      activeTag: null,
      query: '',
      flattened: [],
      tagRules: [],
      locale: localStorage.getItem('tblu-locale') || (navigator.language?.toLowerCase().startsWith('zh') ? 'zh' : 'en'),
      themeMode: localStorage.getItem('tblu-theme-mode') || 'system',
    };

    const DOM = {
      openSidebarButton: document.getElementById('open-sidebar-button'),
      closeSidebarButton: document.getElementById('close-sidebar-button'),
      offCanvasMenu: document.getElementById('off-canvas-menu'),
      offCanvasBackdrop: document.getElementById('off-canvas-backdrop'),
      offCanvasContent: document.getElementById('off-canvas-content'),
      openSearchModalButton: document.getElementById('openSearchModalButton'),
      closeSearchModalButton: document.getElementById('closeSearchModalButton'),
      searchModal: document.getElementById('searchModal'),
      searchInput: document.getElementById('searchInput'),
      clearSearchButton: document.getElementById('clearSearchButton'),
      searchResultsPanel: document.getElementById('searchResultsPanel'),
      selectedTagIndicator: document.getElementById('selectedTagIndicator'),
      searchTagFilterButton: document.getElementById('searchTagFilterButton'),
      searchTagPopup: document.getElementById('searchTagPopup'),
      searchTagFilters: document.getElementById('searchTagFilters'),
      bookmarks: document.getElementById('bookmarks'),
      breadcrumbsPath: document.getElementById('breadcrumbs-path'),
      folderTagSection: document.getElementById('folderTagSection'),
      folderTags: document.getElementById('folderTags'),
      loadingSpinner: document.getElementById('loading-spinner'),
      resetTagFilter: document.getElementById('resetTagFilter'),
      languageToggleButton: document.getElementById('languageToggleButton'),
      languageMenu: document.getElementById('languageMenu'),
      themeToggleButton: document.getElementById('themeToggleButton'),
      themeMenu: document.getElementById('themeMenu'),
      sunIcon: document.getElementById('sunIcon'),
      moonIcon: document.getElementById('moonIcon'),
    };

    function t(key) {
      return I18N[appState.locale]?.[key] || I18N.zh[key] || key;
    }

    function applyLocale() {
      document.querySelectorAll('[data-i18n]').forEach(node => {
        const key = node.dataset.i18n;
        node.textContent = t(key);
      });
      DOM.searchInput.placeholder = t('searchPlaceholder');
      renderTagFilters();
      performSearch();
    }

    function normalize(str = '') {
      return str.toLowerCase().trim();
    }

    function tokenize(str = '') {
      return normalize(str).split(/\s+/).filter(Boolean);
    }

    function getItemTags(item) {
      const raw = Array.isArray(item.tags) ? item.tags : [];
      if (raw.length > 0) {
        return [...new Set(raw.map(tag => String(tag).trim()).filter(Boolean))];
      }
      return deriveTagsFromRules(item);
    }

    function deriveTagsFromRules(item) {
      if (!appState.tagRules.length) return [];
      const text = `${item.title || ''} ${item.url || ''}`.toLowerCase();
      let hostname = '';
      try {
        hostname = item.url ? new URL(item.url).hostname.toLowerCase() : '';
      } catch (_) {
        hostname = '';
      }

      const matched = appState.tagRules
        .filter(rule => {
          const byDomain = (rule.domains || []).some(domain => hostname === domain || hostname.endsWith(`.${domain}`));
          const byKeyword = (rule.keywords || []).some(keyword => keywordMatch(text, String(keyword).toLowerCase()));
          return byDomain || byKeyword;
        })
        .map(rule => rule.tag)
        .filter(Boolean);
      return [...new Set(matched)];
    }

    function keywordMatch(text, keyword) {
      if (!keyword) return false;
      const hasCJK = /[\u4e00-\u9fff]/.test(keyword);
      if (hasCJK) return text.includes(keyword);
      const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const pattern = new RegExp(`(^|[^a-z0-9])${escaped}([^a-z0-9]|$)`, 'i');
      return pattern.test(text);
    }

    function cleanDisplayUrl(url = '') {
      return url.replace('https://', '').replace('http://', '').replace(/\/$/, '');
    }

    function flattenData(nodes, parentPath = []) {
      const items = [];
      nodes.forEach(node => {
        const currentPath = parentPath.concat({ title: node.title, children: node.children || [] });
        const tags = getItemTags(node);
        items.push({ ...node, tags, path: node.type === 'folder' ? currentPath : parentPath });
        if (Array.isArray(node.children) && node.children.length) {
          items.push(...flattenData(node.children, currentPath));
        }
      });
      return items;
    }

    function fuzzyScore(text, query) {
      if (!query) return 1;
      const t = normalize(text);
      const q = normalize(query);
      if (!q) return 1;
      if (t.includes(q)) return 1;
      const words = tokenize(t);
      const qWords = tokenize(q);
      let matchedWords = 0;
      qWords.forEach(qw => {
        if (words.some(w => w.includes(qw) || levenshteinDistance(w, qw) <= 1)) {
          matchedWords += 1;
        }
      });
      return qWords.length ? matchedWords / qWords.length : 0;
    }

    function levenshteinDistance(a, b) {
      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
      for (let i = 0; i <= a.length; i++) dp[i][0] = i;
      for (let j = 0; j <= b.length; j++) dp[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + cost,
          );
        }
      }
      return dp[a.length][b.length];
    }

    function searchInFlattenedData(query, selectedTag) {
      const q = normalize(query);
      return appState.flattened
        .map(item => {
          const text = [item.title, item.url || '', ...(item.tags || [])].join(' ');
          const score = fuzzyScore(text, q);
          const tagMatch = selectedTag ? item.tags.some(t => normalize(t) === normalize(selectedTag)) : true;
          return { item, score, tagMatch };
        })
        .filter(({ item, score, tagMatch }) => item.type === 'link' && tagMatch && (!q || score >= 0.55))
        .sort((a, b) => b.score - a.score)
        .map(({ item }) => item);
    }

    function createTagBadge(tag, onClick, active = false) {
      const badge = document.createElement('button');
      badge.className = `tag-chip ${active ? 'tag-chip-active' : ''}`;
      badge.textContent = tag;
      badge.setAttribute('aria-pressed', active ? 'true' : 'false');
      badge.addEventListener('click', onClick);
      return badge;
    }

    function renderTagFilters() {
      const tagCount = new Map();
      appState.flattened.forEach(item => {
        item.tags?.forEach(tag => {
          tagCount.set(tag, (tagCount.get(tag) || 0) + 1);
        });
      });

      DOM.searchTagFilters.innerHTML = '';
      Array.from(tagCount.entries())
        .sort((a, b) => b[1] - a[1])
        .slice(0, 40)
        .forEach(([tag, count]) => {
          const badge = createTagBadge(tag, () => {
            appState.activeTag = appState.activeTag === tag ? null : tag;
            DOM.resetTagFilter.classList.toggle('hidden', !appState.activeTag);
            performSearch();
            renderTagFilters();
          }, appState.activeTag === tag);
          badge.title = `${count} ${t('records')}`;
          DOM.searchTagFilters.appendChild(badge);
        });
      if (appState.activeTag) {
        DOM.selectedTagIndicator.textContent = `${t('tagFilter')}: ${appState.activeTag}`;
        DOM.selectedTagIndicator.classList.remove('hidden');
      } else {
        DOM.selectedTagIndicator.classList.add('hidden');
      }
    }

    function createCard(title, url, icon, tags = []) {
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';

      const card = document.createElement('div');
      card.className = 'bookmark-card card-unified cursor-pointer flex items-start transition-all p-4 bg-white shadow-sm ring-1 ring-slate-200/70 dark:pintree-ring-gray-800 rounded-2xl dark:pintree-bg-gray-900 dark:hover:pintree-bg-gray-800';
      card.onclick = () => window.open(url, '_blank', 'noopener,noreferrer');

      const cardIcon = document.createElement('img');
      cardIcon.src = getIconUrl(url, icon);
      cardIcon.alt = title;
      cardIcon.className = 'w-10 h-10 mr-4 rounded-xl flex-shrink-0 card-icon-bg p-1';
      cardIcon.onerror = () => {
        if (cardIcon.dataset.fallbackApplied) {
          cardIcon.src = 'assets/default-icon.svg';
          return;
        }
        cardIcon.dataset.fallbackApplied = '1';
        cardIcon.src = getIconUrl(url);
      };

      const cardContent = document.createElement('div');
      cardContent.className = 'flex flex-col overflow-hidden w-full';

      const cardTitle = document.createElement('h2');
      cardTitle.className = 'text-sm font-semibold mb-1 text-slate-700 dark:text-slate-300 truncate';
      cardTitle.innerText = title;

      const cleanUrl = cleanDisplayUrl(url || '');
      const cardUrl = document.createElement('p');
      cardUrl.className = 'text-xs text-slate-400 dark:text-slate-500 truncate';
      cardUrl.innerText = cleanUrl;

      const tagWrap = document.createElement('div');
      tagWrap.className = 'flex flex-wrap gap-1 mt-2';
      tags.slice(0, 4).forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'mini-chip';
        chip.textContent = tag;
        tagWrap.appendChild(chip);
      });

      cardContent.append(cardTitle, cardUrl);
      if (tags.length) cardContent.appendChild(tagWrap);
      card.append(cardIcon, cardContent);
      wrap.appendChild(card);
      return wrap;
    }

    function getIconUrl(url, icon) {
      if (icon && !icon.includes('logo.clearbit.com')) return icon;
      if (!url) return icon || 'assets/default-icon.svg';
      try {
        const hostname = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?domain=${hostname}&sz=64`;
      } catch {
        return icon || 'assets/default-icon.svg';
      }
    }

    function createFolderCard(title, children, path, tags = []) {
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';

      const card = document.createElement('div');
      card.className = 'folder-card card-unified text-gray rounded-2xl cursor-pointer flex flex-col items-center p-2';
      card.onclick = () => {
        const newPath = path.concat({ title, children });
        appState.query = '';
        DOM.searchInput.value = '';
        renderBookmarks(children || [], newPath);
      };

      const cardIcon = document.createElement('div');
      cardIcon.innerHTML = `
        <svg viewBox="0 0 100 80" class="folder__svg">
          <rect x="0" y="0" width="100" height="80" class="folder__back" />
          <rect x="15" y="8" width="70" height="60" class="paper-1" />
          <rect x="10" y="18" width="80" height="50" class="paper-2" />
          <rect x="0" y="10" width="100" height="70" class="folder__front" />
          <rect x="0" y="10" width="100" height="70" class="folder__front right" />
        </svg>
      `;

      const cardTitle = document.createElement('h2');
      cardTitle.className = 'text-xs font-medium text-center w-full truncate dark:text-gray-400';
      cardTitle.innerText = title;

      card.append(cardIcon, cardTitle);
      wrap.appendChild(card);
      return wrap;
    }

    function renderNavigation(folders, container, path = [], level = 0) {
      container.innerHTML = '';
      folders.forEach((folder, index) => {
        if (folder.type !== 'folder') return;
        const li = document.createElement('li');

        const navItem = document.createElement('div');
        navItem.className = 'items-center group flex justify-between gap-x-2 rounded-xl p-2 text-gray-700 dark:text-gray-300 hover:text-main-500 hover:bg-slate-100 dark:hover:pintree-bg-gray-800';
        navItem.style.paddingLeft = `${8 + level * 12}px`;

        const titleWrap = document.createElement('div');
        titleWrap.className = 'flex items-center flex-1 min-w-0 gap-2';
        const folderIcon = document.createElement('span');
        folderIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="currentColor" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7a2 2 0 012-2h4l2 2h7a2 2 0 012 2v7a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" /></svg>';
        const title = document.createElement('button');
        title.className = 'text-sm leading-6 font-semibold text-left flex-1 truncate';
        title.innerText = folder.title;
        titleWrap.append(folderIcon, title);

        const hasChildrenFolder = (folder.children || []).some(item => item.type === 'folder');
        const toggleIcon = document.createElement('span');
        toggleIcon.className = 'text-xs transition-transform';
        toggleIcon.innerHTML = hasChildrenFolder ? '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>' : '';

        navItem.append(titleWrap, toggleIcon);
        li.appendChild(navItem);
        container.appendChild(li);

        const subList = document.createElement('ul');
        subList.className = 'space-y-1 nav-sublist';
        li.appendChild(subList);

        if (hasChildrenFolder) {
          renderNavigation(folder.children, subList, path.concat({ title: folder.title, children: folder.children || [] }), level + 1);
          if (level === 0 && index === 0) {
            subList.classList.add('open');
            toggleIcon.classList.add('rotate-90');
          }
        }

        navItem.addEventListener('click', (e) => {
          e.stopPropagation();
          renderBookmarks(folder.children || [], path.concat({ title: folder.title, children: folder.children || [] }));
          if (hasChildrenFolder) {
            subList.classList.toggle('open');
            toggleIcon.classList.toggle('rotate-90');
          }
        });
      });
    }

    function renderBreadcrumbs(path) {
      DOM.breadcrumbsPath.innerHTML = '';
      path.forEach((item, index) => {
        const breadcrumb = document.createElement('span');
        breadcrumb.className = 'cursor-pointer hover:underline';
        breadcrumb.innerText = item.title;
        breadcrumb.onclick = () => {
          const newPath = path.slice(0, index + 1);
          renderBookmarks(item.children || [], newPath);
        };
        DOM.breadcrumbsPath.appendChild(breadcrumb);
        if (index < path.length - 1) {
          const sep = document.createElement('span');
          sep.innerText = ' > ';
          DOM.breadcrumbsPath.appendChild(sep);
        }
      });
    }

    function showNoResultsMessage() {
      DOM.bookmarks.innerHTML = '';
      const message = document.createElement('div');
      message.className = 'panel-card p-8 text-center text-slate-500 dark:text-slate-300';
      message.innerHTML = `<h2 class="text-lg font-semibold">${t('noResultsTitle')}</h2><p class="text-sm mt-2">${t('noResultsDesc')}</p>`;
      DOM.bookmarks.appendChild(message);
    }

    function renderSearchResultsPanel(results) {
      DOM.searchResultsPanel.innerHTML = '';
      if (!results.length) {
        const empty = document.createElement('p');
        empty.className = 'text-sm text-slate-500 dark:text-slate-400 px-1 py-2';
        empty.textContent = t('noResultsDesc');
        DOM.searchResultsPanel.appendChild(empty);
        return;
      }
      results.slice(0, 80).forEach(item => {
        const row = document.createElement('button');
        row.className = 'w-full text-left p-3 rounded-xl hover:bg-slate-100 dark:hover:pintree-bg-gray-800';
        row.innerHTML = `<div class="text-sm font-medium text-slate-700 dark:text-slate-300 truncate">${item.title}</div>
          <div class="text-xs text-slate-400 truncate">${cleanDisplayUrl(item.url || '')}</div>`;
        row.addEventListener('click', () => {
          const targetPath = item.path || [];
          const parent = targetPath[targetPath.length - 1];
          renderBookmarks(parent?.children || [], targetPath);
          closeSearchModal();
        });
        DOM.searchResultsPanel.appendChild(row);
      });
    }

    function renderFolderTags(path) {
      const current = path[path.length - 1];
      const tags = current ? getItemTags(current) : [];
      DOM.folderTags.innerHTML = '';
      if (!tags.length) {
        DOM.folderTagSection.classList.add('hidden');
        return;
      }
      tags.forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'mini-chip';
        chip.textContent = tag;
        DOM.folderTags.appendChild(chip);
      });
      DOM.folderTagSection.classList.remove('hidden');
    }

    function renderBookmarks(data, path) {
      appState.activePath = path;
      DOM.bookmarks.innerHTML = '';
      renderBreadcrumbs(path);
      renderFolderTags(path);

      const folders = data.filter(item => item.type === 'folder');
      const links = data.filter(item => item.type === 'link');

      if (!folders.length && !links.length) return showNoResultsMessage();

      if (folders.length) {
        const folderSection = document.createElement('div');
        folderSection.className = 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 2xl:grid-cols-5 gap-4';
        folders.forEach(folder => folderSection.appendChild(createFolderCard(folder.title, folder.children, path, getItemTags(folder))));
        DOM.bookmarks.appendChild(folderSection);
      }

      if (links.length) {
        const linkSection = document.createElement('div');
        linkSection.className = 'grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4';
        links.forEach(link => linkSection.appendChild(createCard(link.title, link.url, link.icon, getItemTags(link))));
        DOM.bookmarks.appendChild(linkSection);
      }
    }

    function performSearch() {
      const query = DOM.searchInput.value.trim();
      appState.query = query;
      DOM.clearSearchButton.classList.toggle('hidden', !query && !appState.activeTag);

      if (!query && !appState.activeTag) {
        DOM.searchResultsPanel.innerHTML = '';
        return;
      }

      const results = searchInFlattenedData(query, appState.activeTag);
      renderSearchResultsPanel(results);
    }

    function closeSidebar() {
      DOM.offCanvasBackdrop.classList.remove('opacity-100');
      DOM.offCanvasContent.classList.remove('translate-x-0');
      setTimeout(() => DOM.offCanvasMenu.classList.add('hidden'), 300);
    }

    function openSearchModal() {
      DOM.searchModal.classList.remove('hidden');
      DOM.searchModal.classList.add('flex');
      requestAnimationFrame(() => DOM.searchModal.classList.add('search-open'));
      setTimeout(() => DOM.searchInput.focus(), 120);
      performSearch();
    }

    function closeSearchModal() {
      DOM.searchModal.classList.remove('search-open');
      setTimeout(() => {
        DOM.searchModal.classList.add('hidden');
        DOM.searchModal.classList.remove('flex');
      }, 180);
    }

    function toggleAnimatedMenu(menu) {
      const opening = menu.classList.contains('hidden');
      if (opening) {
        menu.classList.remove('hidden');
        menu.classList.add('menu-enter');
        requestAnimationFrame(() => menu.classList.remove('menu-enter'));
      } else {
        menu.classList.add('menu-enter');
        setTimeout(() => {
          menu.classList.add('hidden');
          menu.classList.remove('menu-enter');
        }, 150);
      }
    }

    function loadAndRenderBookmarks(url) {
      if (!url) return;
      Promise.all([
        fetch(url).then(response => {
          if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
          return response.json();
        }),
        fetch('json/tag-rules.json')
          .then(response => (response.ok ? response.json() : []))
          .catch(() => []),
      ])
        .then(([data, tagRules]) => {
          appState.rawData = data;
          appState.tagRules = Array.isArray(tagRules) ? tagRules : [];
          appState.flattened = flattenData(data);
          const navigationElements = document.getElementsByClassName('navigation');
          const rootFolders = data.filter(item => item.type === 'folder');
          for (let i = 0; i < navigationElements.length; i++) {
            renderNavigation(rootFolders, navigationElements[i], []);
          }
          const first = rootFolders[0];
          renderBookmarks(first?.children || rootFolders, [{ title: first?.title || t('home'), children: first?.children || rootFolders }]);
          renderTagFilters();
          applyLocale();
          DOM.loadingSpinner.style.display = 'none';
        })
        .catch(error => {
          console.error('Error loading bookmarks:', error);
          DOM.loadingSpinner.style.display = 'none';
          showNoResultsMessage();
        });
    }

    function applyDarkTheme() {
      document.documentElement.classList.add('dark');
      DOM.sunIcon.classList.add('hidden');
      DOM.moonIcon.classList.remove('hidden');
    }

    function applyLightTheme() {
      document.documentElement.classList.remove('dark');
      DOM.sunIcon.classList.remove('hidden');
      DOM.moonIcon.classList.add('hidden');
    }

    function applyThemeMode(mode) {
      appState.themeMode = mode;
      localStorage.setItem('tblu-theme-mode', mode);
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const shouldDark = mode === 'dark' || (mode === 'system' && prefersDark);
      shouldDark ? applyDarkTheme() : applyLightTheme();
    }

    DOM.openSidebarButton.addEventListener('click', () => {
      DOM.offCanvasMenu.classList.remove('hidden');
      setTimeout(() => {
        DOM.offCanvasBackdrop.classList.add('opacity-100');
        DOM.offCanvasContent.classList.add('translate-x-0');
      }, 10);
    });
    DOM.closeSidebarButton.addEventListener('click', closeSidebar);
    DOM.offCanvasBackdrop.addEventListener('click', closeSidebar);

    DOM.openSearchModalButton.addEventListener('click', openSearchModal);
    DOM.closeSearchModalButton.addEventListener('click', closeSearchModal);
    DOM.searchModal.addEventListener('click', (e) => {
      if (e.target === DOM.searchModal) closeSearchModal();
    });
    DOM.searchInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        performSearch();
        closeSearchModal();
      }
      if (event.key === 'Escape') closeSearchModal();
    });
    DOM.searchInput.addEventListener('input', () => {
      DOM.clearSearchButton.classList.toggle('hidden', !DOM.searchInput.value.trim() && !appState.activeTag);
      performSearch();
    });

    DOM.clearSearchButton.addEventListener('click', () => {
      DOM.searchInput.value = '';
      appState.activeTag = null;
      DOM.resetTagFilter.classList.add('hidden');
      renderTagFilters();
      performSearch();
    });

    DOM.resetTagFilter.addEventListener('click', () => {
      appState.activeTag = null;
      DOM.resetTagFilter.classList.add('hidden');
      renderTagFilters();
      performSearch();
    });

    DOM.searchTagFilterButton.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleAnimatedMenu(DOM.searchTagPopup);
    });

    DOM.languageToggleButton.addEventListener('click', () => {
      toggleAnimatedMenu(DOM.languageMenu);
      DOM.themeMenu.classList.add('hidden');
    });

    DOM.themeToggleButton.addEventListener('click', () => {
      toggleAnimatedMenu(DOM.themeMenu);
      DOM.languageMenu.classList.add('hidden');
    });

    DOM.languageMenu.querySelectorAll('[data-locale]').forEach(btn => {
      btn.addEventListener('click', () => {
        appState.locale = btn.dataset.locale;
        localStorage.setItem('tblu-locale', appState.locale);
        DOM.languageMenu.classList.add('hidden');
        applyLocale();
      });
    });

    DOM.themeMenu.querySelectorAll('[data-theme]').forEach(btn => {
      btn.addEventListener('click', () => {
        applyThemeMode(btn.dataset.theme);
        DOM.themeMenu.classList.add('hidden');
      });
    });

    document.addEventListener('click', (e) => {
      if (!DOM.languageToggleButton.contains(e.target) && !DOM.languageMenu.contains(e.target)) {
        DOM.languageMenu.classList.add('hidden');
      }
      if (!DOM.themeToggleButton.contains(e.target) && !DOM.themeMenu.contains(e.target)) {
        DOM.themeMenu.classList.add('hidden');
      }
      if (!DOM.searchTagFilterButton.contains(e.target) && !DOM.searchTagPopup.contains(e.target)) {
        DOM.searchTagPopup.classList.add('hidden');
      }
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (appState.themeMode === 'system') applyThemeMode('system');
    });
    applyThemeMode(appState.themeMode);
    applyLocale();

    window.addEventListener('load', () => {
      if (window.bookmarkDataURL) loadAndRenderBookmarks(window.bookmarkDataURL);
    });

    document.addEventListener('bookmarkDataURLReady', (e) => {
      if (e?.detail?.url) loadAndRenderBookmarks(e.detail.url);
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', (event) => {
      const yearElement = document.getElementById('currentYear');
      const currentYear = new Date().getFullYear();
      yearElement.textContent = currentYear;
    });
  </script>

</body>
